<!DOCTYPE html>
<html>
<head>
<title>Bajaj Engineering Skills Training Admission Test</title>
<style>
body{font-family:Arial;background:#f4f6f9}
.header{background:#003366;color:white;text-align:center;padding:20px}
.box{background:white;margin:20px auto;padding:20px;max-width:800px;border-radius:10px}
input,select,button{padding:10px;margin:6px;width:95%}
button{background:#003366;color:white;border:0}
</style>
</head>
<body>

<div class="header">
<h2>SYMBIOSIS INSTITUTE OF TECHNOLOGY (SIT)</h2>
<h3>Bajaj Engineering Skills Training Center</h3>
<p>Symbiosis Institute of Technology, Pune</p>
</div>

<div class="box" id="form">
<h2>Student Details</h2>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="mobile" placeholder="Mobile">
<input id="college" placeholder="College">
<select id="branch">
<option>Mechanical</option><option>Electrical</option>
<option>Electronics</option><option>Automobile</option>
<option>Instrumentation</option><option>Mechatronics</option>
</select>
<button onclick="start()">Start Test</button>
</div>

<div class="box" id="test" style="display:none">
<h3>Time: <span id="timer">45:00</span></h3>
<div id="quiz"></div>
<button onclick="submitTest()">Finish Test / Submit</button>
</div>

<script>
const scriptURL="https://script.google.com/macros/s/AKfycbyJKH3dSQx366p_q_xRN8kFpQkMteX5_5UwvJaokB56TrUwOpgYEhtpt93Wnp7rgug1Vw/exec";

let qs=[
["Ohm's law is","V=IR","P=VI","F=ma","E=mc2",0],
["Current unit is","Volt","Ampere","Ohm","Watt",1],
["CAD is used for","Design","Music","Video","None",0]
];

let t=2700;

function start(){
document.getElementById("form").style.display="none";
document.getElementById("test").style.display="block";
let q=document.getElementById("quiz");
qs.forEach((x,i)=>q.innerHTML+=`<p>${i+1}. ${x[0]}<br>
<input type="radio" name="q${i}" value="0">${x[1]}
<input type="radio" name="q${i}" value="1">${x[2]}
<input type="radio" name="q${i}" value="2">${x[3]}
<input type="radio" name="q${i}" value="3">${x[4]}</p>`);
setInterval(()=>{t--;timer.innerHTML=Math.floor(t/60)+":"+t%60;if(t<=0)submitTest()},1000);
}

function submitTest(){
let score=0;
qs.forEach((x,i)=>{let a=document.querySelector('input[name=q'+i+']:checked');if(a&&a.value==x[5])score++});

fetch(scriptURL,{method:"POST",body:JSON.stringify({
name:name.value,email:email.value,mobile:mobile.value,
college:college.value,branch:branch.value,
score:score,total:qs.length,time:(2700-t)+" sec"
})});

alert("Submitted. Score "+score+"/"+qs.length);
}
</script>
</body>
</html>
